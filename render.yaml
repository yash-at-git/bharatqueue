services:
  - type: web
    name: bharatqueue-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bharatqueue-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: bharatqueue-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: bharatqueue-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 8080

databases:
  - name: bharatqueue-db
    databaseName: bharatqueue
    user: bharatqueue_user
    plan: free