services:
  - type: web
    name: bharatqueue-backend
    runtime: java
    buildCommand: cd backend && ./mvnw clean package -DskipTests
    startCommand: java -jar backend/target/*.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bharatqueue-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: bharatqueue-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: bharatqueue-db
          property: password
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: bharatqueue-db
    databaseName: bharatqueue
    user: bharatqueue_user